<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#eef5ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
width:400px;
text-align:center;
}

h1{
margin-bottom:25px;
color:#333;
}

.btn{
display:block;
margin:15px 0;
padding:12px;
background:#2196F3;
color:white;
text-decoration:none;
border-radius:8px;
transition:.3s;
}

.btn:hover{
background:#0b7dda;
}

.logout{
background:#f44336;
}

.logout:hover{
background:#d32f2f;
}

</style>

</head>

<body>

<div class="card">

<h1> Dashboard</h1>

<a class="btn" href="/tasks/me">Create Task</a>

<a class="btn" href="/tasks">View My Tasks</a>

<a class="btn logout" href="/logout">Logout</a>

</div>

</body>
</html>
