<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Task</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#4facfe,#00c6fb);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:400px;
            background:#fff;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.2);
        }

        h1{
            text-align:center;
            color:#333;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#2196F3;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:.3s;
        }

        button:hover{
            background:#1976D2;
        }

        .links{
            margin-top:20px;
            display:flex;
            justify-content:space-between;
        }

        .links a{
            text-decoration:none;
            color:#2196F3;
            font-weight:bold;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="card">

    <h1> Create Task</h1>

    <form action="/tasks/me" method="POST">
        <input
            type="text"
            name="title"
            placeholder="Enter task title..."
            required
        >

        <button type="submit">Create Task</button>
    </form>

    <div class="links">
        <a href="/dashboard">⬅ Dashboard</a>
        <a href="/tasks"> My Tasks</a>
    </div>

</div>

</body>
</html>
