<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.2);
    text-align:center;
    width:380px;
}

h1{
    color:#333;
    margin-bottom:15px;
}

p{
    color:#666;
    margin-bottom:30px;
}

.btn{
    display:block;
    width:100%;
    padding:12px;
    margin:10px 0;
    text-decoration:none;
    background:#2196F3;
    color:white;
    border-radius:8px;
    transition:.3s;
    font-size:17px;
}

.btn:hover{
    background:#0b7dda;
}
</style>

</head>
<body>

<div class="container">
    <h1> Student Task Manager</h1>
    <p>Manage your daily tasks easily.</p>

    <a href="/register" class="btn">Register</a>
    <a href="/login" class="btn">Login</a>
</div>

</body>
</html>
